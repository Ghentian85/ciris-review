<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e7e5e4" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="#faf8f4"/>
  <rect width="800" height="500" fill="url(#grid)"/>
  <g font-family="-apple-system, sans-serif" text-anchor="middle">
    <text x="400" y="240" font-size="13" letter-spacing="3" fill="#a8a29e" text-transform="uppercase">Screenshot pending</text>
    <text x="400" y="270" font-size="11" fill="#a8a29e">Drop a PNG here named after the step</text>
  </g>
</svg>
